name: Auto reptile news

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch & translate reptile news
        run: node scripts/fetch-news.mjs

      - name: Commit new news (if any)
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/content/news/
          if git diff --staged --quiet; then
            echo "No new news items."
          else
            git commit -m "chore: auto reptile news update"
            git push
          fi

      - name: Build site
        uses: withastro/action@v3
        with:
          node-version: 22

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
