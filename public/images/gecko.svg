<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none" role="img" aria-label="نگهداری گکوی لئوپارد و کرستد">
  <defs>
    <linearGradient id="gkBg" x1="0" y1="0" x2="640" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1512"/><stop offset="1" stop-color="#1b271f"/>
    </linearGradient>
    <radialGradient id="gkGlow" cx="0" cy="0" r="1" gradientTransform="translate(340 190) scale(240)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d9a441" stop-opacity="0.16"/><stop offset="1" stop-color="#d9a441" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gkBody" x1="220" y1="180" x2="440" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d9a441"/><stop offset="1" stop-color="#b9853a"/>
    </linearGradient>
    <pattern id="gkDots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#3fae6d" fill-opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="640" height="400" fill="url(#gkBg)"/>
  <rect width="640" height="400" fill="url(#gkDots)"/>
  <rect width="640" height="400" fill="url(#gkGlow)"/>

  <!-- branch/rock -->
  <ellipse cx="320" cy="318" rx="200" ry="24" fill="#2f9159" fill-opacity="0.16"/>
  <path d="M120 300 c60 -18 120 4 180 -6 c60 -10 120 14 220 -4" stroke="#6b4a2b" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- gecko body -->
  <g fill="url(#gkBody)">
    <path d="M230 300 c-10 -40 20 -78 70 -84 c50 -6 90 20 96 60 c30 6 54 -2 70 8 c14 8 10 22 -4 26
      c-18 6 -40 2 -60 -6 c-10 24 -34 40 -62 40 c-40 0 -90 -8 -100 -44 Z"/>
  </g>
  <!-- tail -->
  <path d="M420 288 c30 4 56 22 66 46 c-24 4 -50 -6 -66 -26 Z" fill="#d9a441"/>
  <!-- leopard spots -->
  <g fill="#0f1512" fill-opacity="0.55">
    <circle cx="270" cy="270" r="7"/>
    <circle cx="300" cy="250" r="6"/>
    <circle cx="330" cy="260" r="8"/>
    <circle cx="360" cy="248" r="6"/>
    <circle cx="250" cy="290" r="5"/>
    <circle cx="390" cy="270" r="6"/>
  </g>
  <!-- head + eye -->
  <ellipse cx="238" cy="286" rx="26" ry="20" fill="#d9a441"/>
  <circle cx="228" cy="282" r="7" fill="#0f1512"/>
  <circle cx="230" cy="279" r="2.4" fill="#eef3ee"/>
  <!-- legs -->
  <g fill="#b9853a">
    <ellipse cx="270" cy="316" rx="10" ry="14"/>
    <ellipse cx="380" cy="316" rx="10" ry="14"/>
  </g>

  <rect x="36" y="344" width="4" height="24" rx="2" fill="#3fae6d"/>
</svg>
