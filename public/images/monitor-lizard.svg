<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none" role="img" aria-label="نگهداری سوسمار مانیتور">
  <defs>
    <linearGradient id="mlBg" x1="0" y1="0" x2="640" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1512"/><stop offset="1" stop-color="#1b271f"/>
    </linearGradient>
    <radialGradient id="mlGlow" cx="0" cy="0" r="1" gradientTransform="translate(320 190) scale(250)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3fae6d" stop-opacity="0.2"/><stop offset="1" stop-color="#3fae6d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mlBody" x1="160" y1="170" x2="480" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2f9159"/><stop offset="1" stop-color="#245f3d"/>
    </linearGradient>
    <pattern id="mlDots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#3fae6d" fill-opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="640" height="400" fill="url(#mlBg)"/>
  <rect width="640" height="400" fill="url(#mlDots)"/>
  <rect width="640" height="400" fill="url(#mlGlow)"/>

  <ellipse cx="320" cy="322" rx="220" ry="22" fill="#2f9159" fill-opacity="0.16"/>
  <path d="M90 300 C220 282 420 316 560 288" stroke="#6b4a2b" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- long tail -->
  <path d="M470 276 c60 -8 110 -28 130 -66 c-56 4 -104 26 -134 60 Z" fill="#245f3d"/>

  <!-- body, long and low -->
  <path d="M200 300
    c-8 -40 24 -70 66 -72
    c50 -2 90 22 108 58
    c40 2 92 -8 96 -8
    c10 4 8 16 -2 20
    c-18 8 -46 6 -66 0
    c-8 22 -32 34 -56 32
    c-50 -4 -140 -6 -146 -30 Z" fill="url(#mlBody)"/>

  <!-- forked tongue -->
  <path d="M150 290 l-22 -6 m22 6 l-22 8" stroke="#d9a441" stroke-width="3" stroke-linecap="round"/>
  <!-- head -->
  <ellipse cx="180" cy="292" rx="34" ry="18" fill="#2f9159"/>
  <circle cx="164" cy="288" r="6" fill="#0f1512"/>
  <circle cx="166" cy="285" r="2" fill="#eef3ee"/>

  <!-- claws / legs -->
  <g fill="#245f3d">
    <ellipse cx="256" cy="316" rx="12" ry="16"/>
    <ellipse cx="400" cy="316" rx="12" ry="16"/>
  </g>
  <!-- scale texture spots -->
  <g fill="#d9a441" fill-opacity="0.35">
    <circle cx="260" cy="266" r="4"/>
    <circle cx="290" cy="256" r="4"/>
    <circle cx="320" cy="262" r="4"/>
    <circle cx="350" cy="256" r="4"/>
  </g>

  <rect x="36" y="344" width="4" height="24" rx="2" fill="#3fae6d"/>
</svg>
