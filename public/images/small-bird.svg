<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none" role="img" aria-label="نگهداری پرندگان زینتی کوچک">
  <defs>
    <linearGradient id="sbBg" x1="0" y1="0" x2="640" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1512"/><stop offset="1" stop-color="#1b271f"/>
    </linearGradient>
    <radialGradient id="sbGlow" cx="0" cy="0" r="1" gradientTransform="translate(340 170) scale(230)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d9a441" stop-opacity="0.18"/><stop offset="1" stop-color="#d9a441" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sbBody1" x1="220" y1="140" x2="340" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3fae6d"/><stop offset="1" stop-color="#2f9159"/>
    </linearGradient>
    <linearGradient id="sbBody2" x1="360" y1="150" x2="470" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d9a441"/><stop offset="1" stop-color="#b9853a"/>
    </linearGradient>
    <pattern id="sbDots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#3fae6d" fill-opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="640" height="400" fill="url(#sbBg)"/>
  <rect width="640" height="400" fill="url(#sbDots)"/>
  <rect width="640" height="400" fill="url(#sbGlow)"/>

  <!-- perch -->
  <rect x="160" y="300" width="340" height="12" rx="6" fill="#6b4a2b"/>

  <!-- bird 1 (budgie-style, green) -->
  <g>
    <path d="M300 300 c40 4 76 26 92 68 c-34 2 -66 -12 -90 -40 Z" fill="#245f3d"/>
    <ellipse cx="270" cy="230" rx="46" ry="58" fill="url(#sbBody1)"/>
    <circle cx="270" cy="176" r="30" fill="#3fae6d"/>
    <path d="M244 168 a26 22 0 0 1 52 0 Z" fill="#d9a441"/>
    <circle cx="280" cy="170" r="6" fill="#0f1512"/>
    <circle cx="282" cy="167" r="2" fill="#eef3ee"/>
    <path d="M244 178 c-16 2 -24 12 -22 24 c10 0 18 -6 24 -14 Z" fill="#d9a441"/>
  </g>

  <!-- bird 2 (lovebird-style, gold/orange) -->
  <g>
    <path d="M430 300 c-38 6 -70 30 -84 70 c34 0 64 -16 86 -44 Z" fill="#8a5a20"/>
    <ellipse cx="410" cy="238" rx="42" ry="52" fill="url(#sbBody2)"/>
    <circle cx="410" cy="188" r="26" fill="#d9a441"/>
    <path d="M388 180 a22 18 0 0 1 44 0 Z" fill="#b9432f"/>
    <circle cx="418" cy="182" r="5.5" fill="#0f1512"/>
    <circle cx="420" cy="179" r="2" fill="#eef3ee"/>
    <path d="M388 190 c-14 2 -20 10 -18 20 c8 0 16 -6 20 -12 Z" fill="#b9432f"/>
  </g>

  <!-- leaves accent -->
  <g fill="#2f9159" fill-opacity="0.6">
    <path d="M150 220 c-30 -6 -52 -26 -58 -54 c30 0 54 20 62 48 Z"/>
  </g>

  <rect x="36" y="344" width="4" height="24" rx="2" fill="#3fae6d"/>
</svg>
